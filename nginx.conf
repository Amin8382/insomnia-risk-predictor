events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files  / /index.html;
        }

        # Cache static assets
        location /static {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
